<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="logo">SocialMarket | Dashboard</div>
    <button class="nav-btn" onclick="window.location.href='index.html'">← Back to Shop</button>
  </header>
  <div class="container">
    <h2>Your Purchased Accounts</h2>
    <div id="dashboardList" class="dashboard-grid"></div>
  </div>

  <script type="module">
    import { SUPABASE_URL, SUPABASE_ANON_KEY } from './js/config.js';
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function loadPurchases() {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) { window.location.href = 'index.html'; return; }

      const { data } = await supabase.from('purchases').select(`
        *, accounts(platform, country), delivered_credentials(email_or_phone, password_encrypted, has_2fa, tfa_host)
      `).eq('user_id', user.id).order('created_at', { ascending: false });

      document.getElementById('dashboardList').innerHTML = data.map(p => `
        <div class="dash-card">
          <div><strong>Status:</strong> ${p.status ? '<span style="color:#2ecc71;">✅ Completed</span>' : '⏳ Pending'}</div>
          <div><strong>Platform:</strong> ${p.accounts.platform} | <strong>Country:</strong> ${p.accounts.country}</div>
          <div><strong>Ref:</strong> ${p.paystack_ref || 'N/A'}</div>
          ${p.status ? `
            <div style="margin-top:0.8rem; background:#f8f9fa; padding:0.8rem; border-radius:6px;">
              <p><strong>Credentials:</strong> <span id="cred-${p.id}" class="cred-hidden" onclick="this.classList.remove('cred-hidden')">
                Email/Phone: ${p.delivered_credentials[0].email_or_phone} | Pass: ${p.delivered_credentials[0].password_encrypted}
              </span></p>
              ${p.delivered_credentials[0].has_2fa ? `<p>2FA Enabled: Yes | Host: ${p.delivered_credentials[0].tfa_host || 'Google Auth/Authy'}</p>` : '<p>2FA: No</p>'}
            </div>
          ` : '<p style="color:#e67e22; margin-top:0.5rem;">Credentials will appear after payment clears.</p>'}
        </div>
      `).join('');
    }

    loadPurchases();
  </script>
</body>
</html>
