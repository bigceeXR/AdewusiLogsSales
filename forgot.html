<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — SocialVault</title>
  <script src="/env.js"></script>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@300;400;600&display=swap" rel="stylesheet" />
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="brand">⚡ SocialVault</a>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">

      <div id="step1">
        <h2>Reset Password</h2>
        <p class="sub">Enter your email and we'll send a reset link.</p>
        <div id="errMsg" class="error-msg"></div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" />
        </div>
        <button class="btn-primary" onclick="sendReset()">Send Reset Link</button>
        <div class="auth-switch"><a href="login.html">← Back to Login</a></div>
      </div>

      <div id="step2" style="display:none">
        <div style="text-align:center;padding:20px 0">
          <div style="font-size:3rem;margin-bottom:16px">📬</div>
          <h2>Check Your Email</h2>
          <p class="sub" style="margin-top:8px">We sent a password reset link to <strong id="sentEmail"></strong>. Click it to set a new password.</p>
          <a href="login.html" class="btn-primary" style="margin-top:24px;display:inline-block">Back to Login</a>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script>
    async function sendReset() {
      const email = document.getElementById('email').value.trim();
      const err = document.getElementById('errMsg');
      err.classList.remove('show');
      if (!email) { err.textContent = 'Please enter your email.'; err.classList.add('show'); return; }
      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/reset.html'
      });
      if (error) { err.textContent = error.message; err.classList.add('show'); return; }
      document.getElementById('sentEmail').textContent = email;
      document.getElementById('step1').style.display = 'none';
      document.getElementById('step2').style.display = 'block';
    }
  </script>
</body>
</html>
