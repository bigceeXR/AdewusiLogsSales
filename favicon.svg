<svg width="512" height="512" viewBox="0 0 512 512" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Pluto Logs</title>
  <desc>Planet Pluto with a stylized letter P</desc>
  <defs>
    <radialGradient id="planetGrad" cx="42%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#5b9bff"/>
      <stop offset="45%" stop-color="#1a6bff"/>
      <stop offset="100%" stop-color="#0a2a80"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3d85ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1a6bff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="craterGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#0a2a80" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#061060" stop-opacity="0.55"/>
    </radialGradient>
    <radialGradient id="shineGrad" cx="35%" cy="28%" r="45%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Outer glow -->
  <ellipse cx="256" cy="256" rx="245" ry="245" fill="url(#glowGrad)"/>

  <!-- Ring back layer -->
  <ellipse cx="256" cy="256" rx="238" ry="55" fill="none" stroke="#a8c8ff" stroke-width="8" stroke-opacity="0.18" transform="rotate(-22,256,256)"/>
  <ellipse cx="256" cy="256" rx="238" ry="55" fill="none" stroke="#1a6bff" stroke-width="3" stroke-opacity="0.28" transform="rotate(-22,256,256)"/>

  <!-- Planet body -->
  <circle cx="256" cy="256" r="185" fill="url(#planetGrad)"/>

  <!-- Surface texture bands -->
  <ellipse cx="256" cy="210" rx="158" ry="22" fill="#1a6bff" fill-opacity="0.22"/>
  <ellipse cx="256" cy="305" rx="140" ry="16" fill="#0a2a80" fill-opacity="0.25"/>
  <ellipse cx="256" cy="355" rx="112" ry="11" fill="#1a6bff" fill-opacity="0.15"/>

  <!-- Craters -->
  <circle cx="335" cy="188" r="24" fill="url(#craterGrad)" stroke="#0a2a80" stroke-width="1.5" stroke-opacity="0.3"/>
  <circle cx="172" cy="322" r="14" fill="url(#craterGrad)" stroke="#0a2a80" stroke-width="1" stroke-opacity="0.25"/>
  <circle cx="300" cy="338" r="9" fill="url(#craterGrad)" stroke="#0a2a80" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Planet shine -->
  <circle cx="256" cy="256" r="185" fill="url(#shineGrad)"/>

  <!-- Stylized P -->
  <text x="256" y="318"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="200"
    font-weight="700"
    font-style="italic"
    fill="#ffffff"
    fill-opacity="0.93"
    letter-spacing="-4">P</text>

  <!-- Ring front layer -->
  <ellipse cx="256" cy="256" rx="238" ry="55" fill="none" stroke="#c8deff" stroke-width="2.5" stroke-opacity="0.13" transform="rotate(-22,256,256)" stroke-dasharray="340 380"/>
</svg>